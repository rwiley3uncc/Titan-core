<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Titan | Personal Assistant</title>

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#f4f6f8;
      color:#111;
    }

    .header{
      background:#0c0c0c;
      color:white;
      padding:20px 30px;
    }

    .header h1{
      margin:0;
      font-size:22px;
    }

    .sub{
      font-size:13px;
      opacity:.7;
    }

    .container{
      max-width:1000px;
      margin:30px auto;
      padding:0 20px;
    }

    .panel{
      background:white;
      border-radius:6px;
      border:1px solid #ddd;
      padding:18px;
      margin-bottom:20px;
    }

    h3{
      margin-top:0;
      margin-bottom:14px;
    }

    #chat{
      height:350px;
      overflow:auto;
      white-space:pre-wrap;
      background:#fafafa;
      border:1px solid #ddd;
      border-radius:4px;
      padding:10px;
      font-family:Consolas, monospace;
      line-height:1.45;
    }

    textarea{
      width:100%;
      margin-top:10px;
      padding:10px;
      border-radius:4px;
      border:1px solid #ccc;
      resize:vertical;
      min-height:72px;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    .button-row{
      display:flex;
      gap:10px;
      margin-top:10px;
    }

    button{
      padding:8px 16px;
      background:#111;
      color:white;
      border:none;
      border-radius:4px;
      cursor:pointer;
    }

    button:hover{
      background:#333;
    }

    #actions{
      font-family:Consolas, monospace;
      background:#fafafa;
      border:1px solid #ddd;
      padding:10px;
      border-radius:4px;
      min-height:24px;
    }

    .action-line{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      padding:8px 0;
      border-bottom:1px solid #eee;
    }

    .action-line:last-child{
      border-bottom:none;
    }

    .action-text{
      flex:1;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .execute-btn{
      flex-shrink:0;
    }

    .footer{
      text-align:center;
      font-size:12px;
      color:#888;
      margin:40px 0 30px;
    }
  </style>
</head>

<body>

  <div class="header">
    <h1>Titan</h1>
    <div class="sub">Personal AI Assistant</div>
  </div>

  <div class="container">

    <div class="panel">
      <h3>Conversation</h3>

      <div id="chat">TITAN: Online. How can I help?</div>

      <textarea id="msg" rows="3" placeholder="Type a message..."></textarea>

      <div class="button-row">
        <button id="sendBtn" type="button">Send</button>
        <button id="newChatBtn" type="button">New Chat</button>
      </div>
    </div>

    <div class="panel">
      <h3>Proposed Actions</h3>
      <div id="actions">(none)</div>
    </div>

  </div>

  <div class="footer">
    Titan Core — Personal Assistant Prototype
  </div>

  <script>
    let currentChatId = null;

    function createChat() {
      currentChatId = "chat_" + Date.now();

      const chat = document.getElementById("chat");
      const actions = document.getElementById("actions");
      const input = document.getElementById("msg");

      chat.textContent = "TITAN: Online. How can I help?";
      actions.textContent = "(none)";
      input.value = "";
    }

    function ensureChat() {
      if (!currentChatId) {
        createChat();
      }
      return currentChatId;
    }

    function appendChatLine(text) {
      const chat = document.getElementById("chat");
      chat.textContent += "\n" + text;
      chat.scrollTop = chat.scrollHeight;
    }

    function renderActions(proposedActions) {
      const actionsDiv = document.getElementById("actions");

      if (!proposedActions || proposedActions.length === 0) {
        actionsDiv.textContent = "(none)";
        return;
      }

      actionsDiv.innerHTML = "";

      proposedActions.forEach((action, index) => {
        const line = document.createElement("div");
        line.className = "action-line";

        const type = action.type || action.action || "unknown";
        const app = action.app ? ` | app: ${action.app}` : "";
        const info = action.info ? ` | info: ${action.info}` : "";
        const value = action.value ? ` | value: ${action.value}` : "";
        const confidence = action.confidence !== undefined
          ? ` | confidence: ${action.confidence}`
          : "";
        const reason = action.reason ? ` | reason: ${action.reason}` : "";

        const text = document.createElement("div");
        text.className = "action-text";
        text.textContent =
          `${index + 1}. ${type}${app}${info}${value}${confidence}${reason}`;

        line.appendChild(text);

        const isExecutable =
          type === "open_app" ||
          type === "open_url";

        if (isExecutable) {
          const btn = document.createElement("button");
          btn.className = "execute-btn";
          btn.type = "button";
          btn.textContent = "Execute";
          btn.onclick = () => executeAction(action);
          line.appendChild(btn);
        }

        actionsDiv.appendChild(line);
      });
    }

    async function sendMsg() {
      const input = document.getElementById("msg");
      const text = input.value.trim();

      if (!text) {
        return;
      }

      ensureChat();
      appendChatLine("YOU: " + text);
      input.value = "";

      try {
        const response = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message: text,
            mode: "personal_general"
          })
        });

        if (!response.ok) {
          appendChatLine("TITAN: Backend error: " + response.status);
          renderActions([]);
          return;
        }

        const data = await response.json();
        console.log("CHAT RESPONSE:", data);

        const reply = data.reply || "No reply returned.";
        const proposedActions = data.proposed_actions || [];

        appendChatLine("TITAN: " + reply);
        renderActions(proposedActions);

      } catch (error) {
        console.error(error);
        appendChatLine("TITAN: Error contacting backend.");
        renderActions([]);
      }
    }

    async function executeAction(action) {
      try {
        const response = await fetch("/api/execute", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(action)
        });

        if (!response.ok) {
          appendChatLine("TITAN: Execute failed: " + response.status);
          return;
        }

        const result = await response.json();
        console.log("EXECUTION RESULT:", result);

        if (result.status === "executed") {
          appendChatLine("TITAN: Action executed.");
        } else if (result.status === "unknown_app") {
          appendChatLine("TITAN: I do not know how to open that app yet.");
        } else if (result.status === "unknown_action") {
          appendChatLine("TITAN: I do not know how to execute that action yet.");
        } else if (result.message) {
          appendChatLine("TITAN: " + result.message);
        } else {
          appendChatLine("TITAN: Action finished.");
        }
      } catch (error) {
        console.error(error);
        appendChatLine("TITAN: Failed to execute action.");
      }
    }

    document.getElementById("sendBtn").addEventListener("click", sendMsg);
    document.getElementById("newChatBtn").addEventListener("click", createChat);

    document.getElementById("msg").addEventListener("keydown", function(event) {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendMsg();
      }
    });

    window.addEventListener("load", function() {
      ensureChat();
    });
  </script>

</body>
</html>
